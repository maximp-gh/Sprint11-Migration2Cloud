name: Debug

permissions:
  id-token: write # Требуется для запроса JWT-токена

# Controls when the workflow will run
on:
  # Запускает выполнение сценария при пуш или пул-реквесте в ветке "main"
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Позволяет запустить сценарий вручную во вкладке Actions
  workflow_dispatch:

jobs:
  job:
    runs-on: ubuntu-latest
    steps:
      - name: Debug OIDC Claims
        uses: actions/github-script@v7
        id: debug
        with:
          script: |
            const token = await core.getIDToken()
            const parts = token.split('.')
            const payload = Buffer.from(parts[1], 'base64').toString('utf8')
            const claims = JSON.parse(payload)
            
            console.log('📋 Все claims:')
            Object.keys(claims).forEach(key => {
              console.log(`  ${key}: ${claims[key]}`)
            })
            
            console.log('\n🎯 SUBJECT (sub):', claims.sub)
            core.setOutput('sub', claims.sub)
